<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a4d68"/>
      <stop offset="1" stop-color="#072d3f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#56b9d6" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#56b9d6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Anchor -->
  <g transform="translate(256 256)" stroke="#ffffff" stroke-width="22" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Ring -->
    <circle cx="0" cy="-128" r="32"/>
    <!-- Vertical shaft -->
    <line x1="0" y1="-96" x2="0" y2="120"/>
    <!-- Crossbar -->
    <line x1="-72" y1="-56" x2="72" y2="-56"/>
    <!-- Curved bottom flukes -->
    <path d="M -120 40 Q -120 130 0 130 Q 120 130 120 40" />
    <!-- Fluke arrow tips -->
    <path d="M -120 40 L -148 22 L -118 12" fill="#ffffff" stroke="#ffffff" stroke-width="14"/>
    <path d="M  120 40 L  148 22 L  118 12" fill="#ffffff" stroke="#ffffff" stroke-width="14"/>
  </g>

  <!-- Subtle wave lines at the bottom -->
  <g stroke="#56b9d6" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M 60 430 Q 130 410 200 430 T 340 430 T 460 430"/>
    <path d="M 90 460 Q 160 440 230 460 T 370 460 T 470 460" opacity="0.5"/>
  </g>
</svg>
